var map, markers = {}, placePositions = {}, activeInfoWindow = null;
var routeRenderer = null;

function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 36.9225, lng: 138.4485 },
        zoom: 15,
        mapTypeControl: true,
        streetViewControl: true,
        fullscreenControl: true
    });

    routeRenderer = new google.maps.DirectionsRenderer({
        map: map, suppressMarkers: true,
        polylineOptions: { strokeColor: '#1a73e8', strokeWeight: 4, strokeOpacity: 0.7 }
    });
    routeRenderer.setMap(null);

    buildSidebar();
    buildDayPlan();
    placeAllMarkers();
    setupControls();
}

function placeAllMarkers() {
    Object.keys(PLACES).forEach(function(cat) {
        markers[cat] = [];
        PLACES[cat].forEach(function(p, idx) {
            var pos = new google.maps.LatLng(p.lat, p.lng);
            placePositions[p.title] = pos;

            var marker = new google.maps.Marker({
                position: pos,
                map: map,
                title: p.title,
                icon: {
                    url: makeSvgIcon(COLORS[cat], p.icon),
                    scaledSize: new google.maps.Size(32, 32),
                    anchor: new google.maps.Point(16, 16)
                }
            });

            var gmLink = '<a href="https://www.google.com/maps/search/?api=1&query=' + p.lat + ',' + p.lng + '" target="_blank" style="font-size:0.72rem; color:#1a73e8; text-decoration:none; font-weight:600;">📍 Google Maps 開啟 →</a>';
            var infoContent = '<div style="max-width:240px;">' +
                '<h3 style="font-size:0.92rem; margin-bottom:3px;">' + p.title + '</h3>' +
                '<div style="font-size:0.76rem; color:#5f6368; margin-bottom:5px;">' + p.sub + '</div>' +
                '<div style="font-size:0.8rem; color:#3c4043; line-height:1.5; margin-bottom:5px;">' + p.desc + '</div>' +
                '<div style="font-size:0.73rem; color:#1a73e8; font-weight:600; margin-bottom:5px;">' + p.meta + '</div>' +
                '<div>' + gmLink + '</div></div>';

            var infoWindow = new google.maps.InfoWindow({ content: infoContent });
            marker.addListener('click', function() {
                if (activeInfoWindow) activeInfoWindow.close();
                infoWindow.open(map, marker);
                activeInfoWindow = infoWindow;
            });

            markers[cat].push({ marker: marker, infoWindow: infoWindow, place: p });
        });
    });
}

function makeSvgIcon(color, emoji) {

        '<circle cx="16" cy="16" r="14" fill="' + color + '" stroke="white" stroke-width="3"/>' +
        '<text x="16" y="22" text-anchor="middle" font-size="14">' + emoji + '</text></svg>';
    return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
}

function buildSidebar() {
    var container = document.getElementById('tab-places');
    var html = '';
    Object.keys(PLACES).forEach(function(cat) {
        var places = PLACES[cat];
        html += '<div class="category-group" data-cat="' + cat + '">';
        html += '<div class="category-header" onclick="toggleCategory(this)">';
        html += '<span>' + CAT_LABELS[cat] + '</span>';
        html += '<span class="count">' + places.length + '</span>';
        html += '</div>';
        html += '<div class="category-items">';
        places.forEach(function(p, i) {
            html += '<div class="place-item" data-cat="' + cat + '" data-idx="' + i + '" onclick="focusPlace(\'' + cat + '\',' + i + ')">';
            html += '<div class="dot" style="background:' + COLORS[cat] + '"></div>';
            html += '<div class="info"><div class="name">' + p.title + '</div><div class="sub">' + p.sub + '</div></div>';
            html += '</div>';
        });
        html += '</div></div>';
    });
    container.innerHTML = html;
}

function toggleCategory(el) {
    var items = el.nextElementSibling;
    items.style.display = items.style.display === 'none' ? '' : 'none';
}

function buildDayPlan() {
    var selHtml = '';
    DAY_PLANS.forEach(function(d, i) {
        selHtml += '<button class="day-btn' + (i === 0 ? ' active' : '') + '" onclick="showDay(' + i + ')">' + d.day + '</button>';
    });
    document.getElementById('day-selector').innerHTML = selHtml;
    showDay(0);
}

function showDay(idx) {
    var d = DAY_PLANS[idx];
    document.querySelectorAll('.day-btn').forEach(function(b, i) { b.classList.toggle('active', i === idx); });
    var html = '<h4>' + d.day + ' · ' + d.date + ' — ' + d.title + '</h4>';
    d.stops.forEach(function(s, i) {
        var clickAttr = s.placeRef ? ' onclick="focusPlaceByTitle(\'' + s.placeRef.replace(/'/g, "\\'") + '\')"' : '';
        html += '<div class="day-stop"' + clickAttr + '>';
        html += '<div class="num">' + (i + 1) + '</div>';
        html += '<div class="stop-info"><span class="stop-name">' + s.name + '</span>';
        html += ' <span class="stop-time">' + s.time + (s.note ? ' · ' + s.note : '') + '</span></div>';
        html += '</div>';
    });
    document.getElementById('day-detail').innerHTML = html;

    if (document.getElementById('toggle-route').checked) {
        drawDayRoute(idx);
    }
    window._currentDay = idx;
}

function focusPlaceByTitle(title) {
    Object.keys(markers).forEach(function(cat) {
        markers[cat].forEach(function(m, idx) {
            if (m.place.title === title) {
                focusPlace(cat, idx);
            }
        });
    });
}

function drawDayRoute(idx) {
    var d = DAY_PLANS[idx];
    var waypoints = [];
    d.stops.forEach(function(s) {
        if (s.placeRef && placePositions[s.placeRef]) {
            waypoints.push(placePositions[s.placeRef]);
        }
    });
    if (waypoints.length < 2) {
        routeRenderer.setMap(null);
        return;
    }
    routeRenderer.setMap(map);
    var origin = waypoints[0];
    var dest = waypoints[waypoints.length - 1];
    var mid = waypoints.slice(1, -1).map(function(w) { return { location: w, stopover: true }; });

    var dirService = new google.maps.DirectionsService();
    dirService.route({
        origin: origin,
        destination: dest,
        waypoints: mid,
        travelMode: google.maps.TravelMode.WALKING
    }, function(result, status) {
        if (status === 'OK') {
            routeRenderer.setDirections(result);
        } else {
            routeRenderer.setMap(null);
        }
    });
}

function focusPlace(cat, idx) {
    document.querySelectorAll('.place-item').forEach(function(el) { el.classList.remove('active'); });
    var el = document.querySelector('.place-item[data-cat="' + cat + '"][data-idx="' + idx + '"]');
    if (el) el.classList.add('active');

    var m = markers[cat] && markers[cat][idx];
    if (m) {
        map.panTo(m.marker.getPosition());
        map.setZoom(17);
        if (activeInfoWindow) activeInfoWindow.close();
        m.infoWindow.open(map, m.marker);
        activeInfoWindow = m.infoWindow;
    }
}

function setupControls() {
    document.querySelectorAll('#controls input[data-layer]').forEach(function(cb) {
        cb.addEventListener('change', function() {
            var layer = this.dataset.layer;
            var visible = this.checked;
            (markers[layer] || []).forEach(function(m) { m.marker.setVisible(visible); });
        });
    });

    document.getElementById('toggle-route').addEventListener('change', function() {
        if (this.checked && window._currentDay !== undefined) {
            drawDayRoute(window._currentDay);
        } else {
            routeRenderer.setMap(null);
        }
    });

    document.querySelectorAll('.sidebar-tabs button').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.sidebar-tabs button').forEach(function(b) { b.classList.remove('active'); });
            document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
            this.classList.add('active');
            document.getElementById('tab-' + this.dataset.tab).classList.add('active');
        });
    });
}
</script>
<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBHfr7Eu4BLkfA1BBd9-SMlmYRDIyJRkGw&libraries=places,directions&callback=initMap"></script>
</body>
